<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
       <!-- Table -->
      <table border="1" cellpadding="10px" cellspacing="8px">
        <caption><h3>Student Table</h3></caption>
   
         <!-- Table Head -->
          <thead>
            <tr bgcolor="lightgreen">
                <th>Name</th>
                <th>Age</th>
                <th>Location</th>
            </tr>
          </thead>
   
           <tbody>
              <tr bgcolor="lightgray">
                <td>Gautham</td>
                <td>10</td>
                <td>Mysore</td>
              </tr>
              <tr>
                <td>Sajjadur</td>
                <td>12</td>
                <td>Bangladesh</td>
              </tr>
              <tr bgcolor="lightgray">
                <td>Litesh</td>
                <td>10</td>
                <td>Solan</td>
              </tr>
           </tbody>

      </table>
    
</body>
</html>
